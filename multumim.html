<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: white;
      border-radius: 2rem;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    .icon {
      width: 80px;
      height: 80px;
      background: #e8f0eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      color: #7a9a86;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #1e2a38;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    p {
      font-size: 1.05rem;
      color: rgba(30,42,56,0.7);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    a.btn {
      display: inline-block;
      background: #c46a4a;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.875rem 2rem;
      border-radius: 0.875rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    a.btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>
    <h1>Mulțumim pentru cerere!</h1>
    <p>Am primit datele tale. Te vom contacta în cel mai scurt timp posibil.</p>
    <a href="/" class="btn">Înapoi la pagina principală</a>
  </div>
</body>
</html>
